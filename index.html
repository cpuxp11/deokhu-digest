<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>덕후방 다이제스트</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f7f7; color: #222; line-height: 1.65; }

.container { max-width: 720px; margin: 0 auto; padding: 24px 20px; }

/* Header */
.header { padding: 32px 0 20px; margin-bottom: 8px; }
.header h1 { font-size: 1.6em; font-weight: 800; color: #222; letter-spacing: -0.5px; }
.header h1 span { color: #FF5A5F; }
.subtitle { font-size: 0.95em; color: #717171; margin-top: 4px; }
.date-nav { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
.date-nav button { background: #fff; border: 1px solid #ddd; color: #222; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 0.9em; font-weight: 500; transition: all 0.15s; }
.date-nav button:hover { border-color: #222; }
.date-nav input[type="date"] { background: #fff; border: 1px solid #ddd; color: #222; padding: 7px 14px; border-radius: 8px; font-size: 0.9em; }

/* Stats */
.stats-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.stat-chip { background: #fff; border: 1px solid #ebebeb; border-radius: 12px; padding: 14px 18px; flex: 1; min-width: 100px; }
.stat-chip .label { font-size: 0.7em; color: #999; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.stat-chip .value { font-size: 1.5em; font-weight: 800; color: #FF5A5F; margin-top: 2px; }
.stat-chip .sub { font-size: 0.78em; color: #999; margin-top: 2px; }

/* Keywords */
.keywords-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.kw { background: #fff; border: 1px solid #ebebeb; padding: 5px 14px; border-radius: 20px; font-size: 0.82em; color: #484848; font-weight: 500; }

/* Section group */
.section-group { background: #fff; border: 1px solid #ebebeb; border-radius: 16px; margin-bottom: 16px; overflow: hidden; }
.section-header { display: flex; align-items: center; gap: 10px; padding: 18px 20px 14px; border-bottom: 1px solid #f0f0f0; cursor: pointer; user-select: none; }
.section-header:hover { background: #fafafa; }
.section-icon { font-size: 1.1em; }
.section-title { font-size: 1.05em; font-weight: 700; color: #222; }
.section-count { background: #f0f0f0; color: #717171; padding: 2px 10px; border-radius: 10px; font-size: 0.78em; font-weight: 600; }
.section-progress { margin-left: auto; font-size: 0.78em; color: #999; }
.section-chevron { color: #ccc; font-size: 0.9em; transition: transform 0.2s; }
.section-group.collapsed .section-chevron { transform: rotate(-90deg); }
.section-group.collapsed .section-items { display: none; }

/* Items */
.item { display: flex; align-items: flex-start; gap: 14px; padding: 14px 20px; border-bottom: 1px solid #f5f5f5; transition: background 0.15s; }
.item:last-child { border-bottom: none; }
.item:hover { background: #fafafa; }
.item.checked { opacity: 0.5; }
.item.checked .item-text { text-decoration: line-through; }

.item-check { flex-shrink: 0; margin-top: 2px; }
.item-check input { width: 18px; height: 18px; accent-color: #FF5A5F; cursor: pointer; }

.item-content { flex: 1; min-width: 0; }
.item-text { font-size: 0.92em; color: #222; line-height: 1.55; font-weight: 500; }
.item-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
.item-tag { background: #f7f7f7; color: #717171; padding: 2px 8px; border-radius: 6px; font-size: 0.72em; font-weight: 500; }

/* Thread angle */
.item-thread { margin-top: 10px; padding: 10px 14px; background: #FFF8F0; border-left: 3px solid #FF5A5F; border-radius: 0 8px 8px 0; font-size: 0.82em; color: #484848; line-height: 1.5; display: none; }
.item-thread.open { display: block; }
.item-thread-label { font-size: 0.7em; font-weight: 700; color: #FF5A5F; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.item-expand { background: none; border: none; color: #FF5A5F; font-size: 0.8em; font-weight: 600; cursor: pointer; margin-top: 6px; padding: 0; }
.item-expand:hover { text-decoration: underline; }

/* Thread drafts */
.draft-card { background: #fff; border: 1px solid #ebebeb; border-radius: 16px; margin-bottom: 16px; overflow: hidden; }
.draft-header { padding: 18px 20px 14px; border-bottom: 1px solid #f0f0f0; }
.draft-target { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 0.72em; font-weight: 700; margin-bottom: 8px; }
.draft-target.본방 { background: #FFF0F0; color: #FF5A5F; }
.draft-target.초보방 { background: #F0F7FF; color: #3B82F6; }
.draft-gsnb { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 0.72em; font-weight: 600; background: #f5f5f5; color: #717171; margin-left: 6px; }
.draft-title { font-size: 1.1em; font-weight: 700; color: #222; margin-top: 6px; }
.draft-body { padding: 16px 20px; white-space: pre-wrap; font-size: 0.88em; color: #333; line-height: 1.7; max-height: 200px; overflow: hidden; position: relative; transition: max-height 0.3s; }
.draft-body.expanded { max-height: none; }
.draft-body:not(.expanded)::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(transparent, #fff); }
.draft-toggle { display: block; width: 100%; padding: 12px; background: none; border: none; border-top: 1px solid #f0f0f0; color: #FF5A5F; font-weight: 600; font-size: 0.85em; cursor: pointer; }
.draft-toggle:hover { background: #fafafa; }
.draft-copy { display: inline-block; margin-left: 12px; padding: 4px 12px; background: #FF5A5F; color: #fff; border: none; border-radius: 6px; font-size: 0.78em; font-weight: 600; cursor: pointer; }
.draft-copy:hover { background: #e04e52; }
.draft-copy.copied { background: #22c55e; }

/* Empty / Loading */
.empty { text-align: center; padding: 60px 20px; color: #999; }
.loading { text-align: center; padding: 80px 20px; }
.loading .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #ebebeb; border-top-color: #FF5A5F; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 640px) {
  .container { padding: 16px 12px; }
  .header h1 { font-size: 1.3em; }
  .stats-bar { gap: 6px; }
  .stat-chip { min-width: 80px; padding: 10px 12px; }
  .stat-chip .value { font-size: 1.2em; }
  .item { padding: 12px 14px; gap: 10px; }
  .section-header { padding: 14px 14px 12px; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1><span>덕후방</span> 다이제스트</h1>
    <div id="subtitle" class="subtitle"></div>
    <div class="date-nav">
      <button id="prev-day">&larr;</button>
      <input type="date" id="date-picker">
      <button id="next-day">&rarr;</button>
    </div>
  </div>

  <div id="loading" class="loading"><div class="spinner"></div></div>

  <div id="content" style="display:none;">
    <div class="stats-bar" id="stats-bar"></div>
    <div class="keywords-bar" id="keywords-bar"></div>
    <div id="sections"></div>
  </div>

  <div id="error" class="empty" style="display:none;">
    <p>해당 날짜의 다이제스트가 아직 없어요.</p>
  </div>

</div>

<script>
const BASE = 'data';
let dates = [];
let currentDate = '';
let checkState = {};

function loadChecks() {
  try { checkState = JSON.parse(localStorage.getItem('deokhu-checks') || '{}'); } catch(e) { checkState = {}; }
}
function saveChecks() {
  localStorage.setItem('deokhu-checks', JSON.stringify(checkState));
}

async function init() {
  loadChecks();
  try {
    const res = await fetch(BASE + '/index.json');
    dates = await res.json();
    dates.sort().reverse();
    if (dates.length > 0) {
      currentDate = dates[0];
      document.getElementById('date-picker').value = currentDate;
      await loadDate(currentDate);
    } else { showError(); }
  } catch(e) { showError(); }
}

async function loadDate(date) {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  try {
    const res = await fetch(BASE + '/' + date + '.json');
    if (!res.ok) throw new Error('not found');
    const data = await res.json();
    render(data);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    showError();
  }
}

function showError() {
  document.getElementById('error').style.display = 'block';
  document.getElementById('content').style.display = 'none';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function render(d) {
  // Subtitle
  document.getElementById('subtitle').textContent = d.subtitle || d.title || '';

  // Stats
  const rooms = d.rooms || {};
  const totalMsgs = Object.values(rooms).reduce((s,r) => s + r.total_msgs, 0);
  const totalUsers = Object.values(rooms).reduce((s,r) => s + r.active_users, 0);
  document.getElementById('stats-bar').innerHTML =
    statChip('Messages', totalMsgs, Object.entries(rooms).map(([n,r]) => n+' '+r.total_msgs).join(' / ')) +
    statChip('Speakers', totalUsers, Object.entries(rooms).map(([n,r]) => n+' '+r.active_users).join(' / ')) +
    statChip('Media', Object.values(rooms).reduce((s,r) => s+r.media, 0), '');

  // Keywords
  document.getElementById('keywords-bar').innerHTML = (d.top_keywords||[]).map(k => '<span class="kw">'+esc(k)+'</span>').join('');

  // Sections (new editorial format)
  const sectionsEl = document.getElementById('sections');
  let html = '';
  if (d.sections) {
    html += d.sections.map(sec => renderSection(sec, d.date)).join('');
  } else {
    html += renderLegacy(d);
  }

  // Thread drafts
  if (d.thread_drafts && d.thread_drafts.length) {
    html += '<div class="section-group" style="border-color:#FF5A5F; border-width:2px;">';
    html += '<div class="section-header" onclick="toggleSection(this)">';
    html += '<span class="section-icon">✍️</span>';
    html += '<span class="section-title">스레드 드래프트</span>';
    html += '<span class="section-count">' + d.thread_drafts.length + '</span>';
    html += '<span class="section-chevron">&#9662;</span>';
    html += '</div><div class="section-items" style="padding:0;">';
    html += d.thread_drafts.map(dr => renderDraft(dr)).join('');
    html += '</div></div>';
  }
  sectionsEl.innerHTML = html;
}

function statChip(label, value, sub) {
  return '<div class="stat-chip"><div class="label">'+label+'</div><div class="value">'+value+'</div>'+(sub?'<div class="sub">'+esc(sub)+'</div>':'')+'</div>';
}

function renderSection(sec, date) {
  const items = sec.items || [];
  const checkedCount = items.filter(it => isChecked(date, it.id)).length;
  const progress = items.length > 0 ? checkedCount + '/' + items.length : '';
  return '<div class="section-group">' +
    '<div class="section-header" onclick="toggleSection(this)">' +
      '<span class="section-icon">' + (sec.icon||'') + '</span>' +
      '<span class="section-title">' + esc(sec.title) + '</span>' +
      '<span class="section-count">' + items.length + '</span>' +
      '<span class="section-progress">' + progress + '</span>' +
      '<span class="section-chevron">&#9662;</span>' +
    '</div>' +
    '<div class="section-items">' +
      items.map(it => renderItem(it, date)).join('') +
    '</div>' +
  '</div>';
}

function renderItem(it, date) {
  const checked = isChecked(date, it.id);
  const hasThread = it.thread_angle && it.thread_angle.trim();
  return '<div class="item' + (checked?' checked':'') + '">' +
    '<div class="item-check"><input type="checkbox"' + (checked?' checked':'') + ' onchange="onCheck(this,\'' + date + '\',\'' + it.id + '\')" /></div>' +
    '<div class="item-content">' +
      '<div class="item-text">' + esc(it.text) + '</div>' +
      '<div class="item-tags">' + (it.keywords||[]).map(k => '<span class="item-tag">'+esc(k)+'</span>').join('') + '</div>' +
      (hasThread ? '<button class="item-expand" onclick="toggleThread(this)">스레드 앵글 보기</button>' +
        '<div class="item-thread"><div class="item-thread-label">Thread Draft</div>' + esc(it.thread_angle) + '</div>' : '') +
    '</div>' +
  '</div>';
}

function renderLegacy(d) {
  // Wrap old format into section-like structure
  let html = '';
  if (d.hot_topics && d.hot_topics.length) {
    html += '<div class="section-group"><div class="section-header" onclick="toggleSection(this)"><span class="section-icon">🔥</span><span class="section-title">핫토픽 TOP 5</span><span class="section-count">'+d.hot_topics.length+'</span><span class="section-chevron">&#9662;</span></div><div class="section-items">';
    d.hot_topics.forEach(t => {
      html += '<div class="item"><div class="item-content"><div class="item-text">#'+t.rank+' '+esc(t.summary)+'</div><div class="item-tags"><span class="item-tag">'+esc(t.room)+'</span><span class="item-tag">'+t.time+'</span><span class="item-tag">'+t.msg_count+'건/'+t.user_count+'명</span>'+(t.keywords||[]).map(k=>'<span class="item-tag">'+esc(k)+'</span>').join('')+'</div></div></div>';
    });
    html += '</div></div>';
  }
  if (d.unanswered && d.unanswered.length) {
    html += '<div class="section-group"><div class="section-header" onclick="toggleSection(this)"><span class="section-icon">🔴</span><span class="section-title">무응답 질문</span><span class="section-count">'+d.unanswered.length+'</span><span class="section-chevron">&#9662;</span></div><div class="section-items">';
    d.unanswered.forEach(u => {
      html += '<div class="item"><div class="item-content"><div class="item-text">'+esc(u.question_summary)+'</div><div class="item-tags"><span class="item-tag">'+esc(u.room)+'</span>'+(u.keywords||[]).map(k=>'<span class="item-tag">'+esc(k)+'</span>').join('')+'</div></div></div>';
    });
    html += '</div></div>';
  }
  if (d.card_candidates && d.card_candidates.length) {
    html += '<div class="section-group"><div class="section-header" onclick="toggleSection(this)"><span class="section-icon">🃏</span><span class="section-title">카드 후보</span><span class="section-count">'+d.card_candidates.length+'</span><span class="section-chevron">&#9662;</span></div><div class="section-items">';
    d.card_candidates.forEach(c => {
      html += '<div class="item"><div class="item-content"><div class="item-text">#'+c.id+' '+esc(c.summary)+'</div><div class="item-tags"><span class="item-tag">'+esc(c.room)+'</span><span class="item-tag">'+c.time+'</span><span class="item-tag">'+c.msg_count+'건</span>'+(c.keywords||[]).map(k=>'<span class="item-tag">'+esc(k)+'</span>').join('')+'</div></div></div>';
    });
    html += '</div></div>';
  }
  return html || '<div class="empty"><p>데이터 없음</p></div>';
}

function isChecked(date, id) { return !!(checkState[date] && checkState[date][id]); }

function onCheck(el, date, id) {
  if (!checkState[date]) checkState[date] = {};
  checkState[date][id] = el.checked;
  saveChecks();
  const item = el.closest('.item');
  if (el.checked) item.classList.add('checked'); else item.classList.remove('checked');
  // Update progress
  loadDate(currentDate);
}

function renderDraft(dr) {
  return '<div class="draft-card">' +
    '<div class="draft-header">' +
      '<span class="draft-target ' + esc(dr.target) + '">' + esc(dr.target) + '</span>' +
      '<span class="draft-gsnb">' + esc(dr.gsnb) + '</span>' +
      '<div class="draft-title">' + esc(dr.title) + '</div>' +
    '</div>' +
    '<div class="draft-body" id="draft-body-' + dr.id + '">' + esc(dr.body) + '</div>' +
    '<button class="draft-toggle" onclick="toggleDraft(\'' + dr.id + '\', this)">전체 보기</button>' +
  '</div>';
}

function toggleDraft(id, btn) {
  const body = document.getElementById('draft-body-' + id);
  body.classList.toggle('expanded');
  btn.textContent = body.classList.contains('expanded') ? '접기' : '전체 보기';
}

function toggleSection(header) {
  header.parentElement.classList.toggle('collapsed');
}

function toggleThread(btn) {
  const thread = btn.nextElementSibling;
  thread.classList.toggle('open');
  btn.textContent = thread.classList.contains('open') ? '스레드 앵글 닫기' : '스레드 앵글 보기';
}

// Date navigation
document.getElementById('date-picker').addEventListener('change', e => { currentDate = e.target.value; loadDate(currentDate); });
document.getElementById('prev-day').addEventListener('click', () => {
  const d = new Date(currentDate); d.setDate(d.getDate()-1);
  currentDate = d.toISOString().slice(0,10);
  document.getElementById('date-picker').value = currentDate; loadDate(currentDate);
});
document.getElementById('next-day').addEventListener('click', () => {
  const d = new Date(currentDate); d.setDate(d.getDate()+1);
  currentDate = d.toISOString().slice(0,10);
  document.getElementById('date-picker').value = currentDate; loadDate(currentDate);
});

init();
</script>
</body>
</html>
