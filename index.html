<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카카오 대시보드</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.min.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #FF5A5F;
      --accent-light: #fff0f0;
      --bg: #f7f7f7;
      --card: #ffffff;
      --text: #222222;
      --text-muted: #717171;
      --border: #e0e0e0;
      --tag-bg: #f0f0f0;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
    }

    /* NAV */
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 0;
    }
    .site-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      padding: 14px 16px 14px 0;
      margin-right: 8px;
      border-right: 1px solid var(--border);
      white-space: nowrap;
    }
    .tab-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      padding: 14px 14px 12px;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-btn:hover { color: var(--text); }

    /* MAIN */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* DATE NAV */
    .date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .date-nav button {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 36px; height: 36px;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .date-nav button:hover { background: var(--accent-light); }
    .date-nav input[type="date"] {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      background: var(--card);
      cursor: pointer;
      flex: 1;
      max-width: 200px;
    }

    /* PAGE HEADER */
    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 22px; font-weight: 800; line-height: 1.3; }
    .page-header .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* STATS BAR */
    .stats-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .stat-chip {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
    }
    .stat-chip span { color: var(--text); font-weight: 700; }

    /* KEYWORDS BAR */
    .keywords-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .kw-tag {
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
    }

    /* SECTION */
    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .section-header:hover { background: #fafafa; }
    .section-icon { font-size: 18px; }
    .section-title { font-size: 16px; font-weight: 700; flex: 1; }
    .section-count {
      background: var(--tag-bg);
      border-radius: 20px;
      padding: 2px 9px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }
    .chevron {
      font-size: 12px;
      color: var(--text-muted);
      transition: transform 0.2s;
    }
    .section.collapsed .chevron { transform: rotate(-90deg); }
    .section-body { padding: 0 20px 16px; }
    .section.collapsed .section-body { display: none; }

    /* ITEM */
    .item {
      border-top: 1px solid var(--border);
      padding: 14px 0;
    }
    .item:first-child { border-top: none; }
    .item-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .item-check {
      width: 18px; height: 18px;
      margin-top: 2px;
      accent-color: var(--accent);
      flex-shrink: 0;
      cursor: pointer;
    }
    .item-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.65;
    }
    .item-text.done { text-decoration: line-through; color: var(--text-muted); }
    .item-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
      padding-left: 28px;
    }
    .item-tag {
      background: var(--tag-bg);
      color: var(--text-muted);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 500;
    }
    .btn-angle, .btn-draft, .btn-copy {
      border: none;
      border-radius: 6px;
      padding: 3px 10px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-angle {
      background: #f0f0f0;
      color: var(--text-muted);
    }
    .btn-angle:hover { background: #e0e0e0; }
    .btn-draft {
      background: var(--accent-light);
      color: var(--accent);
    }
    .btn-draft:hover { background: #ffd9da; }
    .btn-copy {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .btn-copy:hover { background: #c8e6c9; }

    /* THREAD ANGLE */
    .angle-block {
      margin: 8px 0 4px 28px;
      background: #f9f9f9;
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* DRAFT BLOCK */
    .draft-block {
      margin: 8px 0 4px 28px;
      background: #fff8f8;
      border: 1px solid #ffd5d6;
      border-radius: 8px;
      padding: 12px 14px;
    }
    .draft-block pre {
      font-family: 'Pretendard Variable', sans-serif;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
    }
    .draft-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .draft-loading {
      color: var(--text-muted);
      font-size: 13px;
      padding: 8px 0 0 28px;
    }

    /* SEARCH TAB */
    .search-box {
      position: relative;
      margin-bottom: 16px;
    }
    .search-box input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 15px;
      background: var(--card);
      box-shadow: var(--shadow);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .search-status {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .result-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .result-date {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
    }
    .result-room {
      font-size: 11px;
      background: var(--tag-bg);
      color: var(--text-muted);
      border-radius: 20px;
      padding: 2px 8px;
    }
    .result-text { font-size: 14px; line-height: 1.65; }
    .result-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    /* TREND TAB */
    .trend-section { margin-bottom: 28px; }
    .trend-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .bar-chart { display: flex; flex-direction: column; gap: 8px; }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bar-label {
      width: 100px;
      font-size: 13px;
      font-weight: 600;
      text-align: right;
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bar-track {
      flex: 1;
      background: #f0f0f0;
      border-radius: 4px;
      height: 24px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      display: flex;
      align-items: center;
      padding-left: 8px;
      transition: width 0.4s ease;
      min-width: 2px;
    }
    .bar-fill.hot { background: #ff8c00; }
    .bar-count {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }
    .bar-count.outside {
      color: var(--text-muted);
      padding-left: 6px;
    }
    .fire-badge {
      font-size: 14px;
      flex-shrink: 0;
    }

    /* TREND TABLE */
    .trend-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .trend-table th {
      background: #f0f0f0;
      padding: 8px 12px;
      text-align: left;
      font-weight: 700;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    .trend-table td {
      padding: 8px 12px;
      border-bottom: 1px solid #f5f5f5;
    }
    .trend-table tr:last-child td { border-bottom: none; }
    .trend-table td.kw-cell { font-weight: 700; }

    /* EMPTY */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 10px; }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .site-title { font-size: 14px; padding-right: 12px; }
      .tab-btn { font-size: 13px; padding: 14px 10px 12px; }
      .container { padding: 16px 12px 60px; }
      .bar-label { width: 70px; font-size: 12px; }
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-inner">
    <div class="site-title">카카오 대시보드</div>
    <button class="tab-btn active" data-tab="today">📋 오늘</button>
    <button class="tab-btn" data-tab="search">🔍 검색</button>
    <button class="tab-btn" data-tab="trend">📈 트렌드</button>
  </div>
</nav>

<div class="container">

  <!-- TAB: 오늘 -->
  <div id="tab-today" class="tab-panel active">
    <div class="date-nav">
      <button id="btn-prev" title="이전 날짜">←</button>
      <input type="date" id="date-picker" />
      <button id="btn-next" title="다음 날짜">→</button>
    </div>
    <div id="today-content">
      <div class="loading">날짜를 선택하세요...</div>
    </div>
  </div>

  <!-- TAB: 검색 -->
  <div id="tab-search" class="tab-panel">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="키워드로 검색..." autocomplete="off" />
    </div>
    <div class="search-filters">
      <button class="filter-btn active" data-room="all">전체</button>
      <button class="filter-btn" data-room="덕후방">덕후방</button>
      <button class="filter-btn" data-room="초보방">초보방</button>
    </div>
    <div id="search-status" class="search-status"></div>
    <div id="search-results"></div>
  </div>

  <!-- TAB: 트렌드 -->
  <div id="tab-trend" class="tab-panel">
    <div id="trend-content">
      <div class="loading">트렌드 데이터 로딩 중...</div>
    </div>
  </div>

</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
const state = {
  currentDate: todayStr(),
  searchQuery: '',
  searchRoom: 'all',
  allDates: [],
  editorialCache: {},
  keywordsCache: {},
  searchDebounce: null,
};

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function fmtDate(d) {
  return d.replace(/-/g, '.');
}

// ─── Tab ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');

    if (tab === 'trend' && !state.trendLoaded) {
      loadTrend();
    }
    if (tab === 'search' && !state.datesLoaded) {
      loadDates();
    }
  });
});

// ─── Today Tab ───────────────────────────────────────────────────────────────
const datePicker = document.getElementById('date-picker');
datePicker.value = state.currentDate;

datePicker.addEventListener('change', () => {
  state.currentDate = datePicker.value;
  loadToday();
});

document.getElementById('btn-prev').addEventListener('click', () => {
  const d = new Date(state.currentDate);
  d.setDate(d.getDate() - 1);
  state.currentDate = d.toISOString().slice(0, 10);
  datePicker.value = state.currentDate;
  loadToday();
});

document.getElementById('btn-next').addEventListener('click', () => {
  const d = new Date(state.currentDate);
  d.setDate(d.getDate() + 1);
  state.currentDate = d.toISOString().slice(0, 10);
  datePicker.value = state.currentDate;
  loadToday();
});

async function loadToday() {
  const date = state.currentDate;
  const el = document.getElementById('today-content');
  el.innerHTML = '<div class="loading">로딩 중...</div>';

  try {
    const res = await fetch(`/data/editorial/${date}.json`);
    if (res.ok) {
      const data = await res.json();
      state.editorialCache[date] = data;
      el.innerHTML = renderEditorial(data);
      bindItemEvents(el, date);
      return;
    }
  } catch(e) {}

  // Fallback: QA files
  try {
    const [r1, r2] = await Promise.allSettled([
      fetch(`/data/qa/${date}-덕후방.json`).then(r => r.ok ? r.json() : null),
      fetch(`/data/qa/${date}-초보방.json`).then(r => r.ok ? r.json() : null),
    ]);
    const qa1 = r1.status === 'fulfilled' ? r1.value : null;
    const qa2 = r2.status === 'fulfilled' ? r2.value : null;
    if (qa1 || qa2) {
      el.innerHTML = renderQA(date, qa1, qa2);
      bindItemEvents(el, date);
      return;
    }
  } catch(e) {}

  el.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div>${fmtDate(date)} 데이터가 없습니다.</div></div>`;
}

function renderEditorial(data) {
  const rooms = data.rooms || {};
  const totalMsgs = Object.values(rooms).reduce((s, r) => s + (r.total_msgs || 0), 0);
  const totalUsers = Object.values(rooms).reduce((s, r) => s + (r.active_users || 0), 0);
  const totalMedia = Object.values(rooms).reduce((s, r) => s + (r.media || 0), 0);
  const keywords = data.top_keywords || [];

  let html = `
    <div class="page-header">
      <h1>${esc(data.title || data.date)}</h1>
      ${data.subtitle ? `<div class="subtitle">${esc(data.subtitle)}</div>` : ''}
    </div>
    <div class="stats-bar">
      <div class="stat-chip">메시지 <span>${totalMsgs}</span></div>
      <div class="stat-chip">참여자 <span>${totalUsers}</span></div>
      <div class="stat-chip">미디어 <span>${totalMedia}</span></div>
    </div>`;

  if (keywords.length) {
    html += `<div class="keywords-bar">` + keywords.slice(0, 12).map(k =>
      `<span class="kw-tag">${esc(k)}</span>`
    ).join('') + `</div>`;
  }

  const sections = data.sections || [];
  sections.forEach(sec => {
    const items = sec.items || [];
    html += `
      <div class="section" data-section="${esc(sec.id)}">
        <div class="section-header" onclick="toggleSection(this.parentElement)">
          <span class="section-icon">${sec.icon || ''}</span>
          <span class="section-title">${esc(sec.title)}</span>
          <span class="section-count">${items.length}</span>
          <span class="chevron">▾</span>
        </div>
        <div class="section-body">`;

    items.forEach(item => {
      html += renderItem(item, data.date, '덕후방');
    });
    html += `</div></div>`;
  });
  return html;
}

function renderQA(date, qa1, qa2) {
  let html = `<div class="page-header"><h1>${fmtDate(date)} QnA</h1></div>`;
  [[qa1, '덕후방'], [qa2, '초보방']].forEach(([qa, room]) => {
    if (!qa) return;
    const items = qa.messages || qa.items || [];
    if (!items.length) return;
    html += `
      <div class="section">
        <div class="section-header" onclick="toggleSection(this.parentElement)">
          <span class="section-icon">💬</span>
          <span class="section-title">${room}</span>
          <span class="section-count">${items.length}</span>
          <span class="chevron">▾</span>
        </div>
        <div class="section-body">`;
    items.forEach(item => {
      html += renderItem(item, date, room);
    });
    html += `</div></div>`;
  });
  return html;
}

function renderItem(item, date, room) {
  const id = item.id || Math.random().toString(36).slice(2);
  const checked = localStorage.getItem(`check-${date}-${id}`) === '1';
  const tags = (item.keywords || []).map(k => `<span class="item-tag">${esc(k)}</span>`).join('');
  const angle = item.thread_angle || '';

  return `
    <div class="item" data-id="${id}" data-date="${date}" data-room="${esc(room)}">
      <div class="item-row">
        <input type="checkbox" class="item-check" ${checked ? 'checked' : ''} onchange="toggleCheck(this,'${date}','${id}')"/>
        <div class="item-text${checked ? ' done' : ''}">${esc(item.text || '')}</div>
      </div>
      <div class="item-footer">
        ${tags}
        ${angle ? `<button class="btn-angle" onclick="toggleAngle(this)">스레드 앵글</button>` : ''}
        <button class="btn-draft" onclick="generateDraft(this)" data-text="${escAttr(item.text||'')}" data-angle="${escAttr(angle)}" data-room="${escAttr(room)}" data-date="${date}">✍️ 초안 생성</button>
      </div>
      ${angle ? `<div class="angle-block" style="display:none">${esc(angle)}</div>` : ''}
      <div class="draft-area"></div>
    </div>`;
}

function toggleSection(el) {
  el.classList.toggle('collapsed');
}

function toggleCheck(cb, date, id) {
  localStorage.setItem(`check-${date}-${id}`, cb.checked ? '1' : '0');
  const textEl = cb.closest('.item').querySelector('.item-text');
  if (textEl) textEl.classList.toggle('done', cb.checked);
}

function toggleAngle(btn) {
  const block = btn.closest('.item').querySelector('.angle-block');
  if (!block) return;
  const hidden = block.style.display === 'none';
  block.style.display = hidden ? 'block' : 'none';
  btn.textContent = hidden ? '앵글 닫기' : '스레드 앵글';
}

async function generateDraft(btn) {
  const item = btn.closest('.item');
  const draftArea = item.querySelector('.draft-area');
  const text = btn.dataset.text;
  const angle = btn.dataset.angle;
  const room = btn.dataset.room;
  const date = btn.dataset.date;

  btn.disabled = true;
  btn.textContent = '생성 중...';
  draftArea.innerHTML = '<div class="draft-loading">✍️ Claude가 초안을 작성 중입니다 (30~60초)...</div>';

  try {
    // GitHub Pages: draft API 불가
      alert('초안 생성은 로컬 서버(python3 server.py)에서만 가능합니다.');
      btn.textContent = '✍️초안 생성';
      return;
      const res = await fetch('/api/draft', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text, thread_angle: angle, room, date}),
    });
    const data = await res.json();
    if (data.ok) {
      draftArea.innerHTML = `
        <div class="draft-block">
          <pre>${esc(data.draft)}</pre>
          <div class="draft-actions">
            <button class="btn-copy" onclick="copyDraft(this)">📋 복사</button>
          </div>
        </div>`;
    } else {
      draftArea.innerHTML = `<div class="draft-loading" style="color:#c00">오류: ${esc(data.error||'알 수 없는 오류')}</div>`;
    }
  } catch(e) {
    draftArea.innerHTML = `<div class="draft-loading" style="color:#c00">네트워크 오류: ${esc(e.message)}</div>`;
  }
  btn.disabled = false;
  btn.textContent = '✍️ 초안 재생성';
}

function copyDraft(btn) {
  const pre = btn.closest('.draft-block').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = '✅ 복사됨';
    setTimeout(() => { btn.textContent = '📋 복사'; }, 2000);
  });
}

// ─── Search Tab ───────────────────────────────────────────────────────────────
async function loadDates() {
  state.datesLoaded = true;
  try {
    const res = await fetch('/data/dates.json');
    state.allDates = await res.json();
  } catch(e) { state.allDates = []; }
}

document.getElementById('search-input').addEventListener('input', (e) => {
  state.searchQuery = e.target.value.trim();
  clearTimeout(state.searchDebounce);
  state.searchDebounce = setTimeout(runSearch, 350);
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.searchRoom = btn.dataset.room;
    runSearch();
  });
});

async function runSearch() {
  const q = state.searchQuery.toLowerCase();
  if (!q) {
    document.getElementById('search-results').innerHTML = '';
    document.getElementById('search-status').textContent = '';
    return;
  }
  if (!state.datesLoaded) await loadDates();

  const statusEl = document.getElementById('search-status');
  const resultsEl = document.getElementById('search-results');
  statusEl.textContent = '검색 중...';
  resultsEl.innerHTML = '';

  const results = [];
  for (const date of state.allDates) {
    let data = state.editorialCache[date];
    if (!data) {
      try {
        const res = await fetch(`/data/editorial/${date}.json`);
        if (res.ok) { data = await res.json(); state.editorialCache[date] = data; }
      } catch(e) { continue; }
    }
    if (!data) continue;
    const sections = data.sections || [];
    sections.forEach(sec => {
      (sec.items || []).forEach(item => {
        const rooms = Object.keys(data.rooms || {'덕후방':1});
        const room = rooms[0] || '덕후방';
        if (state.searchRoom !== 'all' && room !== state.searchRoom) return;
        const text = (item.text || '').toLowerCase();
        const kws = (item.keywords || []).join(' ').toLowerCase();
        if (text.includes(q) || kws.includes(q)) {
          results.push({date, room, item});
        }
      });
    });
  }

  statusEl.textContent = `${results.length}개 결과`;
  if (!results.length) {
    resultsEl.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><div>"${esc(q)}" 검색 결과가 없습니다.</div></div>`;
    return;
  }

  resultsEl.innerHTML = results.slice(0, 50).map(({date, room, item}) => {
    const tags = (item.keywords||[]).map(k => `<span class="item-tag">${esc(k)}</span>`).join('');
    return `
      <div class="result-card">
        <div class="result-meta">
          <span class="result-date">${fmtDate(date)}</span>
          <span class="result-room">${esc(room)}</span>
        </div>
        <div class="result-text">${esc(item.text||'')}</div>
        <div class="result-tags">${tags}</div>
        <div style="margin-top:8px">
          <button class="btn-draft" onclick="generateDraft(this)" data-text="${escAttr(item.text||'')}" data-angle="${escAttr(item.thread_angle||'')}" data-room="${escAttr(room)}" data-date="${date}">✍️ 초안 생성</button>
        </div>
        <div class="draft-area"></div>
      </div>`;
  }).join('');
}

// ─── Trend Tab ────────────────────────────────────────────────────────────────
async function loadTrend() {
  state.trendLoaded = true;
  const el = document.getElementById('trend-content');

  const today = new Date();
  const dates = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    dates.push(d.toISOString().slice(0, 10));
  }

  const kwMap = {}; // term → {total, byDate: {date: count}}

  await Promise.allSettled(dates.map(async date => {
    let data = state.keywordsCache[date];
    if (!data) {
      try {
        const res = await fetch(`/data/keywords/${date}.json`);
        if (res.ok) { data = await res.json(); state.keywordsCache[date] = data; }
      } catch(e) { return; }
    }
    if (!data) return;
    const rooms = data.rooms || {};
    Object.values(rooms).forEach(room => {
      (room.unigrams || []).forEach(({term, count}) => {
        if (!kwMap[term]) kwMap[term] = {total: 0, byDate: {}};
        kwMap[term].total += count;
        kwMap[term].byDate[date] = (kwMap[term].byDate[date] || 0) + count;
      });
    });
  }));

  const sorted = Object.entries(kwMap).sort((a, b) => b[1].total - a[1].total).slice(0, 10);
  if (!sorted.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📊</div><div>최근 7일 키워드 데이터가 없습니다.</div></div>`;
    return;
  }

  const maxTotal = sorted[0][1].total || 1;
  const yesterday = dates[dates.length - 1];
  const weekAvgDivisor = Math.max(dates.length - 1, 1);

  // Bar chart
  let html = `<div class="trend-section"><div class="trend-title">상위 10 키워드 (최근 7일)</div><div class="bar-chart">`;
  sorted.forEach(([term, info]) => {
    const pct = Math.round((info.total / maxTotal) * 100);
    const yesterdayCount = info.byDate[yesterday] || 0;
    const weekAvg = (info.total - yesterdayCount) / weekAvgDivisor;
    const isHot = weekAvg > 0 && yesterdayCount >= weekAvg * 2;
    const showCount = pct > 12;
    html += `
      <div class="bar-row">
        <div class="bar-label" title="${esc(term)}">${esc(term)}</div>
        <div class="bar-track">
          <div class="bar-fill${isHot ? ' hot' : ''}" style="width:${pct}%">
            ${showCount ? `<span class="bar-count">${info.total}</span>` : ''}
          </div>
        </div>
        ${!showCount ? `<span class="bar-count outside">${info.total}</span>` : ''}
        ${isHot ? `<span class="fire-badge" title="급상승">🔥</span>` : ''}
      </div>`;
  });
  html += `</div></div>`;

  // Table
  html += `<div class="trend-section"><div class="trend-title">7일 추이</div>
    <div style="overflow-x:auto">
    <table class="trend-table">
      <thead><tr>
        <th>키워드</th>`;
  dates.forEach(d => { html += `<th>${d.slice(5)}</th>`; });
  html += `<th>합계</th></tr></thead><tbody>`;

  sorted.forEach(([term, info]) => {
    const yesterdayCount = info.byDate[yesterday] || 0;
    const weekAvg = (info.total - yesterdayCount) / weekAvgDivisor;
    const isHot = weekAvg > 0 && yesterdayCount >= weekAvg * 2;
    html += `<tr><td class="kw-cell">${esc(term)}${isHot ? ' 🔥' : ''}</td>`;
    dates.forEach(d => { html += `<td>${info.byDate[d] || 0}</td>`; });
    html += `<td><strong>${info.total}</strong></td></tr>`;
  });
  html += `</tbody></table></div></div>`;
  el.innerHTML = html;
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

loadToday();
